<!DOCTYPE html>
<html lang="es">
<head>
    <!--Validacion de protocolos de HTML e idioma-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IVA</title>

    <!--Referencia a codigos de JS y CSS-->
    <link rel="stylesheet" href="styles.css"/>
    <script src="calcular.js"></script>
</head>

<body>
    <div class="cont-body">
        <h1 class="titulo-principal">Calculadora de IVA</h1>
        <h2 class="subtitulo">Ingrese el precio de su producto</h2>

        <div class="cont-calculadora">
            <h3>Precio del producto</h3>
            <div class="caja-texto">
                <span class="simbolo-input">$</span>
                <input type="number" class="precio">
            </div>
            <br>
            <h3>Porcentaje de IVA</h3>
            <div class="caja-texto">
                <span class="simbolo-input">%</span>
                <input type="number" class="IVA">
            </div>
            <br>
            <div class="cont-botones">
                <button class="calcular-IVA" role="button">Calcular IVA</button>
                <button class="limpiar" role="button">Limpiar</button>
            </div>   
        </div>

        </div>
    </div>
</body>

</html>
