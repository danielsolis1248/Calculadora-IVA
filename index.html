<!DOCTYPE html>
<html lang="es">
<head>
    <!--Validacion de protocolos de HTML e idioma-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IVA</title>
    <link rel="icon" href="Imagenes/icono-calculadora.ico" type="image/x-icon">

    <!--Referencia a codigos de JS y CSS-->
    <link rel="stylesheet" href="styles.css"/>
    <script src="calcular.js" defer></script>
</head>

<body>
    <div class="cont-body">
        <!--Titulo y subtitulo-->
        <h1 class="titulo-principal">Calculadora de IVA</h1>
        <h2 class="subtitulo">Ingrese el precio de su producto</h2>

        <!--Contenido de calculadora-->
        <div class="cont-calculadora">
            <h3>Precio del producto</h3>
            
            <!--Caja de texto Precio-->
            <div class="caja-texto">
                <span class="simbolo-input">$</span>
                <input type="text" class="precio" id="precio" placeholder="Escribe el precio">
            </div>
            <br>            
            <h3>Porcentaje de IVA</h3>
            
            <!--Caja de texto IVA-->
            <div class="caja-texto">
                <span class="simbolo-input">%</span>
                <input class="IVA" id="IVA" type="text" min="0" placeholder="Escribe el % de IVA">
            </div>
            <br>

            <!--Botones-->
            <div class="cont-botones">
                <!--Boton para calcular IVA-->
                <button class="calcular-IVA" role="button" onclick="calcularIVA()">
                    <img src="Imagenes/calculadora.svg" class="icono-btn">
                    Calcular IVA 
                </button>
                
                <!--Boton para limpiar los campos de texto-->
                <button class="limpiar" role="button" onclick="limpiarCampos()">
                    <img src="Imagenes/basura.svg" class="icono-btn">
                    Limpiar
                </button>
            </div>   
        </div>
        
        <!--Modal de resultado-->
        <div id="modal" class="modal">
            <div class="modal-contenido">
                <span class="cerrar" onclick="cerrarModal()">&times;</span>
                <p class="txt-resultado" id="txt-resultado">El precio final de tu producto con IVA es</p>
                <p class="resultado" id="resultado"></p>
            </div>
        </div>
    </div>
</body>

</html>
